version: '3.8'

services:
  nawaz-bot:
    build: .
    container_name: nawaz-trader-bot
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - SYNC_INTERVAL_MINUTES=60
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - nawaz-network

  backend:
    image: node:18-alpine
    container_name: nawaz-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    command: npm start
    restart: unless-stopped
    networks:
      - nawaz-network

networks:
  nawaz-network:
    driver: bridge