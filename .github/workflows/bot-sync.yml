name: Automated Product Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm install
    - name: Create .env file
      run: |
        cat > .env << EOF
        NODE_ENV=production
        PORT=5001
        ALIBABA_API_KEY=${{ secrets.ALIBABA_API_KEY }}
        ALIBABA_API_SECRET=${{ secrets.ALIBABA_API_SECRET }}
        AMAZON_ACCESS_KEY=${{ secrets.AMAZON_ACCESS_KEY }}
        AMAZON_SECRET_KEY=${{ secrets.AMAZON_SECRET_KEY }}
        AMAZON_SELLER_ID=${{ secrets.AMAZON_SELLER_ID }}
        BACKEND_URL=${{ secrets.BACKEND_URL }}
        BACKEND_API_TOKEN=${{ secrets.BACKEND_API_TOKEN }}
        SYNC_INTERVAL_MINUTES=60
        ALIBABA_SEARCH_KEYWORDS=${{ secrets.ALIBABA_SEARCH_KEYWORDS }}
        PRODUCT_MARKUP_PERCENT=25
        AUTO_UPDATE_INVENTORY=true
        AUTO_UPDATE_PRICES=true
        EOF
    - run: npm run sync-alibaba
      continue-on-error: true
    - run: npm run sync-amazon
      continue-on-error: true
    - uses: actions/upload-artifact@v3
      if: always()
      with:
        name: bot-logs
        path: logs/
        retention-days: 30